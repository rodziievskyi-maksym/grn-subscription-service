name: ${PROJECT_NAME}

#network
networks:
  public:
    name: ${PROJECT_NAME:-genesis-case-task}-public
    driver: bridge

  private:
    name: ${PROJECT_NAME:-genesis-case-task}-private
    driver: bridge
#    internal: true #No external access - database isolated
    ipam:
      config:
        - subnet: "10.0.0.0/19"
          gateway: "10.0.0.1"

#volumes
volumes:
  go-data:
  db-data:
  redis-data:
  prometheus-data:

#secrets
secrets:
  db_pass_secret:
    file: ./db_pass_secret.txt

