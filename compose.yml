  db:
    image: postgres:17-alpine
    container_name: ${PROJECT_NAME:-genesis-case-task}-db
    restart: unless-stopped
#    //TODO: remove ports after tests are done
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dev} -d ${DB_NAME:-genesis-case-task-db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - POSTGRES_USER=${DB_USER:-dev}
      - POSTGRES_DB=${DB_NAME:-genesis-case-task-db}
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_pass_secret
    secrets:
      - db_pass_secret
    networks:
      - private
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-geneis-case-task}-redis
    restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes" ]
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - private
    volumes:
      - redis-data:/data

  prometheus:
    image: prom/prometheus:latest
    container_name: ${PROJECT_NAME:-genesis-case-task}-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - private
      - public