<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Release Notifier</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-6">
<div class="max-w-md w-full bg-slate-800 rounded-xl shadow-2xl p-8 border border-slate-700">
    <h1 class="text-2xl font-bold mb-2 text-blue-400">🚀 Release Notifier</h1>
    <p class="text-slate-400 text-sm mb-6">Підпишіться на оновлення GitHub репозиторіїв</p>

    <form id="subscribeForm" class="space-y-4">
        <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Email</label>
            <input type="email" id="email" required placeholder="your@email.com"
                   class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500 transition">
        </div>
        <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Repository</label>
            <input type="text" id="repo" required placeholder="owner/repository"
                   class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500 transition">
        </div>
        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition duration-200 transform hover:scale-[1.02] active:scale-95">
            Підписатися
        </button>
    </form>

    <div id="message" class="mt-6 p-4 rounded-lg hidden text-sm font-medium"></div>
</div>

<script>
    const appConfig = {
        apiKey: {{ printf "%q" .APIKey }}
    };

    const form = document.getElementById('subscribeForm');
    const msgDiv = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const data = {
            email: document.getElementById('email').value,
            repository: document.getElementById('repo').value
        };

        // Показуємо стан завантаження
        msgDiv.className = 'mt-6 p-4 rounded-lg text-sm font-medium bg-blue-500/20 text-blue-300';
        msgDiv.textContent = 'Обробка...';
        msgDiv.classList.remove('hidden');

        try {
            const response = await fetch('/api/v1/subscribe', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-API-KEY': appConfig.apiKey
                },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (response.ok) {
                msgDiv.className = 'mt-6 p-4 rounded-lg bg-green-500/20 text-green-400 border border-green-500/50';
                msgDiv.textContent = `✅ Успішно! Останній тег: ${result.last_seen_tag}`;
                form.reset();
            } else {
                throw new Error(result.error || 'Щось пішло не так');
            }
        } catch (err) {
            msgDiv.className = 'mt-6 p-4 rounded-lg bg-red-500/20 text-red-400 border border-red-500/50';
            msgDiv.textContent = `❌ Помилка: ${err.message}`;
        }
    });
</script>
</body>
</html>
